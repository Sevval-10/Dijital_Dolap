services:
  db:
    image: postgres:16
    container_name: digital_closet_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: digital_closet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    container_name: digital_closet_server
    restart: unless-stopped
    env_file:
      - server/.env
    ports:
      - "5000:5000"
    depends_on:
      - db
    volumes:
      - ./server/uploads:/app/server/uploads

  client:
    build:
      context: .
      dockerfile: docker/client.Dockerfile
    container_name: digital_closet_client
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - server

  n8n:
    image: n8nio/n8n:latest
    container_name: digital_closet_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      N8N_SHARED_SECRET: change_me
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data:
